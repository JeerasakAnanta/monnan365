stages:
  - build
  - deploy

variables:
  REGISTRY: ghcr.io
  # หมายเหตุ: กรุณาตั้งค่า Variables เหล่านี้ใน GitLab (Settings > CI/CD > Variables):
  # - GITHUB_USER: ชื่อผู้ใช้ GitHub ที่มีสิทธิ์เข้าถึง GHCR
  # - GITHUB_TOKEN: Personal Access Token (PAT) ของ GitHub ที่มีสิทธิ์ write:packages
  # - GITHUB_OWNER: ชื่อ Owner ของ Repository บน GitHub (เช่น ชื่อยูสเซอร์ หรือองค์กร)
  # - SERVER_HOST: IP หรือโดเมนของเซิร์ฟเวอร์ปลายทาง
  # - SERVER_USER: ชื่อยูสเซอร์สำหรับ SSH เข้าเซิร์ฟเวอร์
  # - SERVER_SSH_KEY: Private Key สำหรับเชื่อมต่อ SSH
  # - OPENROUTER_API_KEY, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY

# ---------------------------------------------
# Job: Build & Push Docker Image
# ---------------------------------------------
build_images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    # รันเมื่อ push ที่ branch main หรือเมื่อมี git tags (เช่น v0.1.4)
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    # 1. กำหนดเวอร์ชันและ Tag ของรูปภาพ
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="latest"
      fi

    # 2. ทำการล็อกอินเข้า GHCR.io หากเป็น Tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Logging in to GitHub Container Registry..."
        echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_USER" --password-stdin
      fi

    # 3. Build Docker Image (ใช้ Root Context และแนบ Supabase Build Args ตาม Dockerfile)
    - echo "Building monnan365-app..."
    - >
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
      --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
      -t "$REGISTRY/$GITHUB_OWNER/monnan365-app:$IMAGE_TAG"
      .

    # 4. Push Image ไปยัง Registry เฉพาะกรณีที่เป็น Git Tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Pushing monnan365-app..."
        docker push "$REGISTRY/$GITHUB_OWNER/monnan365-app:$IMAGE_TAG"
      fi

# ---------------------------------------------
# Job: Deploy to Server
# ---------------------------------------------
deploy_to_server:
  stage: deploy
  image: alpine:3
  rules:
    # ทำงานเฉพาะเมื่อมี Git Tag (เช่น v*.*.*) เท่านั้น
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying version $CI_COMMIT_TAG to server..."
    # 1. คัดลอก docker-compose.yml ไปยังเซิร์ฟเวอร์ปลายทาง
    - scp docker-compose.yml "$SERVER_USER@$SERVER_HOST:~/app/docker-compose.yml"
    
    # 2. สั่งรันคำสั่งผ่าน SSH เพื่อสร้าง .env ล็อกอิน และรัน Docker Compose
    - >
      ssh "$SERVER_USER@$SERVER_HOST" "
        mkdir -p ~/app &&
        cat > ~/app/.env << 'EOF'
      IMAGE_NAME=$REGISTRY/$GITHUB_OWNER/monnan365-app:$CI_COMMIT_TAG
      OPENROUTER_API_KEY=$OPENROUTER_API_KEY
      NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
      EOF

        echo \"$GITHUB_TOKEN\" | docker login \"$REGISTRY\" -u \"$GITHUB_USER\" --password-stdin &&
        cd ~/app &&
        set -e &&
        docker compose pull &&
        docker compose up -d
      "
