stages:
  - install
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

install:
  stage: install
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

lint_and_typecheck:
  stage: test
  image: node:22-slim
  needs: ["install"]
  script:
    - npm run lint
    - npx tsc --noEmit -p tsconfig.json

build_check:
  stage: test
  image: node:22-slim
  needs: ["install"]
  variables:
    NEXT_PUBLIC_SUPABASE_URL: $NEXT_PUBLIC_SUPABASE_URL
    NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: $NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
  script:
    - npm run build

docker_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - >
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
      --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
      -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"

# Requires these CI/CD variables to be configured in GitLab
# (Settings > CI/CD > Variables) before this job can run:
#   VPS_HOST              - VPS hostname or IP
#   VPS_USER              - SSH user on the VPS
#   VPS_SSH_PRIVATE_KEY   - private key for that user (masked + protected)
#   VPS_APP_DIR           - path on the VPS containing docker-compose.yml + .env
deploy_vps:
  stage: deploy
  image: alpine:3
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" "
        set -e &&
        cd $VPS_APP_DIR &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d &&
        docker image prune -f
      "
