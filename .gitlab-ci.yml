stages:
  - build
  - deploy

variables:
  REGISTRY: ghcr.io
  # หมายเหตุ: กรุณาตั้งค่า Variables เหล่านี้ใน GitLab (Settings > CI/CD > Variables):
  # - GITHUB_USER: ชื่อผู้ใช้ GitHub ที่มีสิทธิ์เข้าถึง GHCR
  # - GITHUB_TOKEN: Personal Access Token (PAT) ของ GitHub ที่มีสิทธิ์ write:packages
  # - GITHUB_OWNER: ชื่อ Owner ของ Repository บน GitHub (เช่น ชื่อยูสเซอร์ หรือองค์กร)
  # - SERVER_HOST: IP หรือโดเมนของเซิร์ฟเวอร์ปลายทาง
  # - SERVER_USER: ชื่อยูสเซอร์สำหรับ SSH เข้าเซิร์ฟเวอร์
  # - SERVER_SSH_KEY: Private Key สำหรับเชื่อมต่อ SSH (ตั้งค่าเป็นประเภท File หรือใส่ท่อ tr -d ในสคริปต์)
  # - POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_PORT, CLIENT_PORT, JWT_SECRET

# ---------------------------------------------
# Job: Build & Push Docker Image
# ---------------------------------------------
build_images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    # รันเมื่อ push ที่ branch main หรือเมื่อมี git tags (เช่น v0.1.4)
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    # 1. คำนวณเวอร์ชันของแอปโดยการตัดตัวอักษร 'v' ออกจาก tag (เช่น v0.1.4 -> 0.1.4)
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=$(echo "${CI_COMMIT_TAG#v}")
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        APP_VERSION="latest"
        IMAGE_TAG="latest"
      fi
    
    # 2. ทำการล็อกอินเข้า GHCR.io หากเป็น Tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Logging in to GitHub Container Registry..."
        echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_USER" --password-stdin
      fi

    # 3. Build & Push: tour-booking-app
    - echo "Building tour-booking-app..."
    - >
      docker build
      --build-arg APP_VERSION="$APP_VERSION"
      -t "$REGISTRY/$GITHUB_OWNER/tour-booking-app:$IMAGE_TAG"
      ./apps/client

    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Pushing tour-booking-app..."
        docker push "$REGISTRY/$GITHUB_OWNER/tour-booking-app:$IMAGE_TAG"
      fi

    # 4. Build & Push: tour-booking-migrate (target: migrator)
    - echo "Building tour-booking-migrate..."
    - >
      docker build
      --target migrator
      -t "$REGISTRY/$GITHUB_OWNER/tour-booking-migrate:$IMAGE_TAG"
      ./apps/client

    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Pushing tour-booking-migrate..."
        docker push "$REGISTRY/$GITHUB_OWNER/tour-booking-migrate:$IMAGE_TAG"
      fi

# ---------------------------------------------
# Job: Deploy to Server
# ---------------------------------------------
deploy_to_server:
  stage: deploy
  image: alpine:3
  rules:
    # ทำงานเฉพาะเมื่อมี Git Tag (เช่น v*.*.*) เท่านั้น
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying version $CI_COMMIT_TAG to server..."
    # 1. คัดลอก docker-compose.yml ไปยังเซิร์ฟเวอร์ปลายทาง
    - scp docker-compose.yml "$SERVER_USER@$SERVER_HOST:~/app/docker-compose.yml"
    
    # 2. สั่งรันคำสั่งผ่าน SSH เพื่อสร้าง .env ล็อกอิน และรัน Docker Compose
    - >
      ssh "$SERVER_USER@$SERVER_HOST" "
        mkdir -p ~/app &&
        cat > ~/app/.env << 'EOF'
      POSTGRES_USER=$POSTGRES_USER
      POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      POSTGRES_DB=$POSTGRES_DB
      POSTGRES_PORT=$POSTGRES_PORT
      CLIENT_PORT=$CLIENT_PORT
      JWT_SECRET=$JWT_SECRET
      IMAGE_TAG=$CI_COMMIT_TAG
      EOF

        echo \"$GITHUB_TOKEN\" | docker login \"$REGISTRY\" -u \"$GITHUB_USER\" --password-stdin &&
        cd ~/app &&
        set -e &&
        docker compose pull &&
        docker compose run --rm migrate &&
        docker compose up -d
      "
